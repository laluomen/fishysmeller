<!-- popup.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; font-family: sans-serif; margin: 0; padding: 0; }
    .header { background: #1D1D1D; color: white; padding: 14px 16px;
              display: flex; align-items: center; gap: 10px; }
    .score-ring { width: 64px; height: 64px; margin: 16px auto; }
    .verdict { text-align: center; font-size: 18px; font-weight: 700;
               padding: 6px 0; }
    .flags { padding: 12px 16px; }
    .flag-item { background: #f5f5f5; border-radius: 6px; padding: 8px 12px;
                 margin: 6px 0; font-size: 12px; }
    .flag-label { font-weight: 600; color: #333; }
    .engine-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px;
                    display: inline-block; margin-left: 6px; }
    .dfa { background: #B5D4F4; color: #042C53; }
    .nfa { background: #FAECE7; color: #4A1B0C; }
  </style>
</head>
<body>
  <div class="header">
    <span>🛡️</span>
    <div>
      <div style="font-size:14px;font-weight:600">PhishGuard</div>
      <div id="url-display" style="font-size:11px;opacity:0.7;
           max-width:240px;overflow:hidden;text-overflow:ellipsis;
           white-space:nowrap"></div>
    </div>
  </div>
  <div id="result-area" style="padding:16px">
    <p style="color:#999;font-size:13px;text-align:center">Menganalisis...</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
